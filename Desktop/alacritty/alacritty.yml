env:
  TERM: xterm-256color

window:
  padding:
    # x: 55
    # y: 30
    x: 30
    y: 25

  opacity: 1.0

  title: Alacritty

  class:
    instance: Alacritty
    general: Alacritty

  gtk_theme_variant: None

scrolling:
  history: 10000

  multiplier: 1

font:
  normal:
    family: JetBrainsMonoNL Nerd Font Propo
    style: Regular

  size: 13.0

  offset:
    x: 0
    y: 2

colors:
  primary:
    background: '#041216'
    foreground: '#c5c9c5'

  normal:
    black:   '#353131'
    red:     '#c4746e'
    green:   '#b8bb26'
    yellow:  '#fabd2f'
    blue:    '#83a598'
    magenta: '#d3869b'
    cyan:    '#8ea4a2'
    white:   '#c5c9c5'

  bright:
    black:   '#495049'
    red:     '#E46876'
    green:   '#87a987'
    yellow:  '#E6C384'
    blue:    '#7FB4CA'
    magenta: '#938AA9'
    cyan:    '#7AA89F'
    white:   '#c5c9c5'

  selection:
    background: '#2D4F67'
    foreground: '#C8C093'

  indexed_colors:
    - { index: 16, color: '#b6927b' }
    - { index: 17, color: '#b98d7b' }

  transparent_background_colors: false

key_bindings:
  - { key: K,    mods: Alt|Shift,   mode: ~Alt,        action: ScrollPageUp,  }
  - { key: J,  mods: Alt|Shift,   mode: ~Alt,        action: ScrollPageDown }
