# start window indexing at one instead of zero
set -g base-index 1

# change the modifier key
# unbind C-b
# set-option -g prefix C-b

# ============
# Key Bindings
# ============
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."
bind-key N run-shell "tmux neww ~/.local/bin/tms"
bind-key W run-shell "tmux neww -n wiki 'cd $WIKI_HOME && nvim index.md'"
bind-key h run-shell "tmux switch-client -t 'Home 🏠'"
bind-key Space run-shell "tmux neww ~/.local/bin/tmswitch"

# ============
# Vim mode
# ============
setw -g mode-keys vi
set -g mouse on
set -sg escape-time 10
set -g history-limit 5000

# ================
# Pane Navigation
# ================
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D 


# ===============
# General Options
# ===============
set -g history-limit 10000
set -g default-terminal 'screen-256color'
set -ga terminal-overrides ',*256col*:Tc'
set-option -g default-command zsh
set -sg escape-time 0
setw -g automatic-rename on
set -g set-titles on
set -g base-index 1
setw -g pane-base-index 1
set-window-option -g status-left "[#S]"
set-window-option -g status-left-length 30

# ===================
# Colors and visuals
# ===================
setw -g clock-mode-colour colour2
set -g status-style 'fg=colour244'
set -g status-left ''
set -g status-right-length 20
set -g status-right '%a %d-%m-%Y %H:%M'
# panes
set -g pane-border-style 'fg=colour223'
set -g pane-active-border-style 'fg=colour2'
# window style
setw -g window-status-current-style 'fg=colour9 bold'
setw -g window-status-current-format ' #I#[fg=colour249]:#[fg=colour255]#W#[fg=colour249]#F '
setw -g window-status-style 'fg=colour223'
setw -g window-status-format ' #I#[fg=colour249]:#[fg=colour250]#W#[fg=colour244]#F '
# bell
setw -g window-status-bell-style 'fg=colour255 bg=colour1 bold'
